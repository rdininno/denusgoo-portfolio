<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Denusgoo</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- GSAP -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

        <!-- Styles -->
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!-- Morphing Blobs -->
        <div class="blob-container">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
        </div>

        <!-- Intro Section -->
        <section class="intro">
            <div class="intro-overlay"></div>
            <!-- Gallery slides sit BEHIND the text -->
            <div class="featured-gallery" id="featured-gallery">
                <div class="featured-slide featured-slide-1"></div>
                <div class="featured-slide featured-slide-2"></div>
            </div>

            <!-- Text sits on top with mix-blend-mode -->
            <h1 class="intro-name">Denusgoo</h1>

            <!-- Landing Section -->
            <div class="landing-content">
                <div class="landing-buttons">
                    <a href="drawings.html" class="btn btn-drawings">
                        <span class="btn-bg"></span>
                        <span class="btn-text">Drawings</span>
                        <span class="btn-arrow">→</span>
                    </a>

                    <a href="videos.html" class="btn btn-videos">
                        <span class="btn-bg"></span>
                        <span class="btn-text">Videos</span>
                        <span class="btn-arrow">→</span>
                    </a>

                    <a href="photography.html" class="btn btn-photography">
                        <span class="btn-bg"></span>
                        <span class="btn-text">Photography</span>
                        <span class="btn-arrow">→</span>
                    </a>
                </div>
            </div>
        </section>

        <!-- Scripts -->
        <script src="js/app.js"></script>
        <script src="js/featured.js"></script>
    </body>
</html>
